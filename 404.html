<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-container {
            max-width: 500px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
        }
        .error-code {
            font-size: 7rem;
            font-weight: 900;
            color: #dc3545;
            line-height: 1;
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container text-center d-flex justify-content-center">
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <!-- English Text -->
            <h2 class="fw-bold my-3 text-dark">Oops! Page Not Found</h2>
            <p class="text-muted mb-4">It looks like you've reached a wrong URL or this page has been deleted.</p>
            
            <!-- Homepage Link -->
            <a href="/" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm">Back to Homepage</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
